# 复制本文件为 config.yaml 并填入密钥，或使用环境变量 OPENAI_API_KEY / GRSAI_API_KEY
openai:
  api_key: ""
  model: "gpt-4o"
  base_url: "https://api.openai.com/v1"

nano_banana:
  api_key: ""
  base_url: "https://grsai.dakka.com.cn"
  model: "nano-banana-pro"
  image_size: "2K"
  aspect_ratio: "4:3"
  poll_interval: 3
  max_poll_time: 300

output:
  dir: "./output"
  save_prompts: true
